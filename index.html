<!DOCTYPE html>
<html lang=en>
<head>
    <meta charset=UTF-8>
    <meta name=viewport content=width=device-width,initial-scale=1>
    <title>Shower in the Dark | Master Your Sleep</title>
    <style>
        @import url(https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500&family=Inter:wght@300;400&display=swap);
        
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            background-image: url(image_8df295.png);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #ffffff;
            font-family: Inter, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            overflow-x: hidden;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.85) 100%);
            z-index: 1;
            pointer-events: none;
        }

        .content {
            position: relative;
            z-index: 10;
            padding: 20px;
            max-width: 900px;
            width: 90%;
        }

        h1 {
            font-family: Jost, sans-serif;
            font-size: clamp(3rem, 10vw, 5.5rem);
            font-weight: 300;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin: 0;
            line-height: 1.1;
        }

        .tagline {
            font-family: Jost, sans-serif;
            font-size: clamp(0.9rem, 2vw, 1.2rem);
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: #D4AF37;
            margin-top: 25px;
            font-weight: 400;
        }

        .description {
            max-width: 650px;
            margin: 40px auto;
            font-size: 1.1rem;
            line-height: 1.8;
            font-weight: 300;
            color: rgba(255,255,255,0.85);
        }

        .cta-container {
            display: flex;
            gap: 25px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 60px;
            position: relative;
            z-index: 20;
        }

        .cta-button {
            display: inline-block;
            padding: 20px 45px;
            text-decoration: none;
            font-family: Jost, sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-size: 0.85rem;
            border-radius: 4px;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            min-width: 240px;
            box-sizing: border-box;
        }

        .primary-btn {
            background-color: #ffffff;
            color: #050505;
            border: 1px solid #ffffff;
        }

        .primary-btn:hover {
            background-color: #D4AF37;
            border-color: #D4AF37;
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        .secondary-btn {
            border: 1px solid #D4AF37;
            color: #D4AF37;
            background: transparent;
        }

        .secondary-btn:hover {
            background: rgba(212, 175, 55, 0.15);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        footer {
            position: absolute;
            bottom: 40px;
            z-index: 5;
            font-size: 0.65rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>
    <div class=overlay></div>

    <div class=content>
        <h1>Shower in the Dark</h1>
        <div class=tagline>The Ultimate Night Routine</div>
        
        <p class=description>
            Standard lighting disrupts your biological clock. Reclaim your evening with a zero-blue-light routine designed to maximize melatonin and trigger profound relaxation.
        </p>

        <div class=cta-container>
            <a href=products.html class="cta-button primary-btn">Shop the Collection</a>
            <a href=science.html class="cta-button secondary-btn">Explore the Science</a>
        </div>
    </div>

    <footer>Est. 2026 | Curated Sleep Engineering</footer>
</body>
</html>
