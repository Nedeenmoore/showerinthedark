<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shower in the Dark | Sensory Minimalism</title>
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: rgba(255, 255, 255, 0.03);
            --accent-color: #3a86ff;
            --text-main: #f0f0f0;
            --text-dim: #888;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .hero-image {
            width: 100%;
            max-width: 800px;
            height: 300px;
            border-radius: 20px;
            object-fit: cover;
            margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            /* Using a mood-appropriate placeholder from Unsplash */
            background-image: url('https://images.unsplash.com/photo-1517055212517-5755e10086d9?q=80&w=2000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 800;
            letter-spacing: -2px;
            margin: 0;
            background: linear-gradient(to bottom, #fff, #444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            font-size: 1.2rem;
            color: var(--text-dim);
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            max-width: 900px;
            width: 100%;
            margin-bottom: 60px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 16px;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.05);
        }

        .card h3 {
            margin-top: 0;
            color: var(--accent-color);
            font-size: 1.3rem;
        }

        .card p {
            line-height: 1.6;
            color: var(--text-dim);
            margin-bottom: 0;
        }

        .cta-button {
            background-color: #fff;
            color: #000;
            text-decoration: none;
            padding: 18px 36px;
            border-radius: 100px;
            font-weight: 700;
