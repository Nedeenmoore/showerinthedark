<!DOCTYPE html>
<html lang=en>
<head>
    <meta charset=UTF-8>
    <meta name=viewport content=width=device-width,initial-scale=1>
    <title>Shower in the Dark | Master Your Sleep</title>
    <style>
        @import url(https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500&family=Inter:wght@300;400&display=swap);
        
        /* Fallback background color ensures page is never blank */
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            background-image: url(image_8df295.PNG);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            color: #ffffff;
            font-family: Inter, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.9) 100%);
            z-index: 1;
            pointer-events: none;
        }

        .content {
            position: relative;
            z-index: 10;
            padding: 20px;
            max-width: 900px;
            width: 90%;
        }

        h1 {
            font-family: Jost, sans-serif;
            font-size: clamp(2.5rem, 8vw, 5.5rem);
            font-weight: 300;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin: 0;
        }

        .tagline {
            font-family: Jost, sans-serif;
            font-size: 1rem;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: #D4AF37;
            margin-top: 20px;
        }

        .cta-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 50px;
        }

        .cta-button {
            display: inline-block;
            padding: 18px 40px;
            text-decoration: none;
            font-family: Jost, sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-size: 0.8rem;
            border-radius: 4px;
            min-width: 200px;
            transition: 0.3s;
        }

        .primary { background: #ffffff; color: #050505; }
        .secondary { border: 1px solid #D4AF37; color: #D4AF37; }
    </style>
</head>
<body>
    <div class=overlay></div>
    <div class=content>
        <h1>Shower in the Dark</h1>
        <div class=tagline>Protect Your Melatonin</div>
        <div class=cta-container>
            <a href=products.html class="cta-button primary">Shop Collection</a>
            <a href=science.html class="cta-button secondary">Explore Science</a>
        </div>
    </div>
</body>
</html>
