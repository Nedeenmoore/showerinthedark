<!DOCTYPE html>
<html lang=en>
<head>
    <meta charset=UTF-8>
    <meta name=viewport content=width=device-width,initial-scale=1>
    <title>Contact | Shower in the Dark</title>
    
    <meta name="description" content="Connect with the Shower in the Dark collective. Inquire about the circadian protocol, technical tools, or community collaborations.">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ContactPage",
      "name": "Contact Shower in the Dark",
      "description": "The official communication channel for the Circadian Architecture community and protocol support.",
      "mainEntity": {
        "@type": "Organization",
        "name": "Shower in the Dark",
        "url": "https://yourdomain.com"
      }
    }
    </script>

    <style>
        @import url(https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500&family=Inter:wght@300;400;600&display=swap);
        
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            background-image: url(image_8df295.PNG);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #ffffff;
            font-family: Inter, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5,5,5,0.9);
            z-index: 1;
            pointer-events: none;
        }

        .content {
            position: relative;
            z-index: 10;
            padding: 40px;
            max-width: 600px;
            width: 90%;
            background: rgba(15, 15, 15, 0.6);
            border: 1px solid rgba(212, 175, 55, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 4px;
            text-align: center;
        }

        h1 {
            font-family: Jost, sans-serif;
            font-size: 2rem;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            color: #D4AF37;
            margin-bottom: 40px;
        }

        .form-group {
            margin-bottom: 25px;
            text-align: left;
        }

        label {
            display: block;
            font-family: Jost, sans-serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: #888;
            margin-bottom: 10px;
        }

        input, textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 15px;
            border-radius: 2px;
            font-family: Inter, sans-serif;
            font-size: 1rem;
            outline: none;
            box-sizing: border-box;
        }

        input:focus, textarea:focus {
            border-color: #D4AF37;
        }

        .btn-submit {
            display: inline-block;
            width: 100%;
            padding: 18px;
            background: transparent;
            border: 1px solid #D4AF37;
            color: #D4AF37;
            font-family: Jost, sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.4s;
            border-radius: 4px;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background: #D4AF37;
            color: #000;
        }

        .back-link {
            display: block;
            margin-top: 30px;
            text-decoration: none;
            color: #666;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            transition: 0.3s;
        }

        .back-link:hover {
            color: #D4AF37;
        }
    </style>
</head>
<body>
    <div class=overlay></div>

    <div class=content>
        <h1>Contact</h1>
        
        <form action=https://formspree.io/f/xjgprebk method=POST>
            <div class=form-group>
                <label>Identity</label>
                <input type=text name=name required>
            </div>
            <div class=form-group>
                <label>Email</label>
                <input type=email name=email required>
            </div>
            <div class=form-group>
                <label>Message</label>
                <textarea name=message rows=5 required></textarea>
            </div>
            <button type=submit class=btn-submit>Send Transmission</button>
        </form>

        <a href=index.html class=back-link>Return to Portal</a>
    </div>
</body>
</html>
